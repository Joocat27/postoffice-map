<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도봉구 우체국 혼잡도 지도</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e6ec;
    --primary: #c0392b;
    --primary-soft: #fdecea;
    --text: #1a1e2e;
    --text-sub: #5a6478;
    --low: #27ae60;
    --mid: #e67e22;
    --high: #e05a2b;
    --peak: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--primary);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-icon {
    font-size: 22px;
  }
  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  header p {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 1px;
  }
  .legend {
    margin-left: auto;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-sub);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── 지도 ── */
  #map {
    flex: 1;
    width: 100%;
  }

  /* ── 팝업 ── */
  .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 0;
    min-width: 360px;
  }
  .leaflet-popup-tip {
    background: var(--surface);
    box-shadow: none;
  }
  .leaflet-popup-content {
    margin: 0;
    width: 100% !important;
  }
  .leaflet-popup-close-button {
    color: var(--text-sub) !important;
    font-size: 18px !important;
    top: 8px !important;
    right: 10px !important;
  }

  .popup-inner {
    padding: 16px 18px 14px;
  }
  .popup-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .popup-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--primary-soft);
    color: var(--primary);
    border: 1px solid rgba(192,57,43,0.2);
    margin-bottom: 12px;
  }

  /* 요일 탭 */
  .day-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .day-tab {
    flex: 1;
    padding: 5px 0;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-tab:hover {
    background: var(--primary-soft);
    color: var(--primary);
    border-color: rgba(192,57,43,0.3);
  }
  .day-tab.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    font-weight: 700;
  }

  /* 차트 영역 */
  .chart-wrap {
    position: relative;
    height: 180px;
  }

  /* 혼잡도 요약 */
  .congestion-summary {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .summary-box {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    text-align: center;
  }
  .summary-label {
    font-size: 10px;
    color: var(--text-sub);
    margin-bottom: 2px;
  }
  .summary-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* 안내 */
  .kml-notice {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text-sub);
    white-space: nowrap;
    z-index: 900;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">📮</div>
  <div>
    <h1>도봉구 우체국·우편취급소 혼잡도</h1>
    <p>카카오 시간대별 방문자 데이터 기반 · 평일(월~금) · 09:00–17:00</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4caf7d"></div>여유 (~40%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div>보통 (40~65%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e05a2b"></div>혼잡 (65~85%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>매우혼잡 (85%+)</div>
  </div>
</header>

<div id="map"></div>
<div class="kml-notice">📌 마커를 클릭하면 시간대별 혼잡도 차트가 표시됩니다</div>

<script>

    "days": {

      "화": {"9":58.7,"10":32.1,"11":39.1,"12":53.3,"13":58.2,"14":57.1,"15":56.0,"16":58.2,"17":26.1},

      "목": {"9":54.9,"10":52.7,"11":80.4,"12":49.5,"13":53.8,"14":28.8,"15":76.6,"16":54.3,"17":73.9},

};

const HOURS = ["9","10","11","12","13","14","15","16","17"];
const DAYS  = ["월","화","수","목","금"];

// ── 혼잡도 → 색상 ──
function congestionColor(v) {
  if (v === null || v === undefined) return '#555';
  if (v < 40)  return '#4caf7d';
  if (v < 65)  return '#f0b429';
  if (v < 85)  return '#e05a2b';
  return '#c0392b';
}

// ── 마커 평균 혼잡도 계산 ──
function avgCongestion(place) {
  let sum = 0, cnt = 0;
  for (const day of DAYS) {
    for (const h of HOURS) {
      const v = place.days[day]?.[h];
      if (v !== null && v !== undefined) { sum += v; cnt++; }
    }
  }
  return cnt ? sum / cnt : 0;
}

// ── 커스텀 마커 SVG ──
function makeIcon(avg) {
  const color = congestionColor(avg);
  const svg = `<svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24C32 7.16 24.84 0 16 0z" fill="${color}" stroke="white" stroke-width="2"/>
    <text x="16" y="20" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="white">📮</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [32, 40],
    iconAnchor: [16, 40],
    popupAnchor: [0, -40]
  });
}

// ── 지도 초기화 ──
const map = L.map('map', {
  center: [37.655, 127.028],
  zoom: 14,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── 차트 인스턴스 관리 ──
let currentChart = null;

function renderChart(canvasId, place, day) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const vals  = HOURS.map(h => place.days[day]?.[h] ?? null);
  const colors = vals.map(v => congestionColor(v));
  const labels = HOURS.map(h => `${h}시`);

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: colors,
        borderColor: colors,
        borderWidth: 0,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw !== null ? `혼잡도 ${ctx.raw}%` : '데이터 없음'
          },
          backgroundColor: '#ffffff',
          borderColor: '#e2e6ec',
          borderWidth: 1,
          titleColor: '#1a1e2e',
          bodyColor: '#5a6478'
        }
      },
      scales: {
        x: {
          ticks: { color: '#5a6478', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.05)' }
        },
        y: {
          min: 0, max: 100,
          ticks: {
            color: '#5a6478',
            font: { size: 11 },
            callback: v => v + '%'
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      }
    }
  });
}

function updatePopup(pid, day) {
  const place = CONGESTION_DATA[pid];
  const vals  = HOURS.map(h => place.days[day]?.[h]).filter(v => v !== null && v !== undefined);
  const avg   = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
  const peak  = vals.length ? Math.max(...vals).toFixed(1) : '-';
  const peakH = vals.length ? `${HOURS[vals.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v)[0].i]}시` : '-';

  document.getElementById(`avg-${pid}`).textContent  = avg === '-' ? '-' : `${avg}%`;
  document.getElementById(`peak-${pid}`).textContent = peak === '-' ? '-' : `${peak}%`;
  document.getElementById(`peakh-${pid}`).textContent = peakH;

  renderChart(`chart-${pid}`, place, day);

  // 탭 활성화
  document.querySelectorAll(`.day-tab[data-pid="${pid}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.day === day);
  });
}

// ── 마커 생성 ──
for (const [pid, place] of Object.entries(CONGESTION_DATA)) {
  const avg = avgCongestion(place);
  const marker = L.marker([place.lat, place.lng], { icon: makeIcon(avg) }).addTo(map);

  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-name">${place.name}</div>
      <div class="popup-badge">${place.category}</div>
      <div class="day-tabs">
        ${DAYS.map(d => `<button class="day-tab${d==='월'?' active':''}" data-pid="${pid}" data-day="${d}" onclick="updatePopup('${pid}','${d}')">${d}</button>`).join('')}
      </div>
      <div class="chart-wrap">
        <canvas id="chart-${pid}"></canvas>
      </div>
      <div class="congestion-summary">
        <div class="summary-box">
          <div class="summary-label">평균 혼잡도</div>
          <div class="summary-val" id="avg-${pid}">-</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">피크 혼잡도</div>
          <div class="summary-val" id="peak-${pid}">-</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">피크 시간</div>
          <div class="summary-val" id="peakh-${pid}">-</div>
        </div>
      </div>
    </div>`;

  marker.bindPopup(popupHtml, { maxWidth: 400 });

  marker.on('popupopen', () => {
    setTimeout(() => updatePopup(pid, '월'), 50);
  });
}
</script>
</body>
</html>
