<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도봉구 우체국 혼잡도 지도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f8fa; --surface:#fff; --border:#e2e6ec;
    --primary:#c0392b; --primary-soft:#fdecea;
    --text:#1a1e2e; --text-sub:#5a6478;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); }
  body { display:flex; flex-direction:column; overflow:hidden; }

  header {
    background:var(--surface); border-bottom:2px solid var(--primary);
    padding:10px 20px; display:flex; align-items:center; gap:14px;
    flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.06); position:relative; z-index:100;
  }
  .header-icon { font-size:22px; }
  header h1 { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
  header p  { font-size:11px; color:var(--text-sub); margin-top:1px; }
  .legend { margin-left:auto; display:flex; gap:14px; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-sub); }
  .legend-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  #map-wrap { flex:1; position:relative; }
  #map      { width:100%; height:100%; }

  /* 로딩 / 에러 오버레이 */
  #overlay-msg {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:50;
    background:var(--bg); gap:12px; text-align:center; padding:20px;
  }
  .msg-icon  { font-size:36px; }
  .msg-title { font-size:16px; font-weight:700; }
  .msg-body  { font-size:13px; color:var(--text-sub); line-height:1.8; }
  .msg-code  {
    background:#1a1e2e; color:#f0b429; font-family:'DM Mono',monospace;
    font-size:12px; padding:10px 16px; border-radius:8px; margin-top:8px;
    display:inline-block;
  }

  .hint {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.92); border:1px solid var(--border);
    border-radius:8px; padding:7px 16px; font-size:11px; color:var(--text-sub);
    white-space:nowrap; z-index:10; pointer-events:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }

  /* 팝업 */
  .k-popup-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.14);
    width:370px; position:relative; margin-bottom:14px;
  }
  .k-popup-wrap::after {
    content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
    border:10px solid transparent; border-top-color:var(--surface); border-bottom:0;
  }
  .k-popup-close {
    position:absolute; top:10px; right:12px; background:none; border:none;
    font-size:16px; color:var(--text-sub); cursor:pointer; z-index:2;
    padding:2px 4px; border-radius:4px;
  }
  .k-popup-close:hover { background:var(--primary-soft); color:var(--primary); }
  .k-popup-inner { padding:16px 18px 14px; }
  .k-popup-name  { font-size:15px; font-weight:700; padding-right:24px; margin-bottom:4px; }
  .k-popup-badge {
    display:inline-block; font-size:10px; padding:2px 7px; border-radius:10px;
    background:var(--primary-soft); color:var(--primary);
    border:1px solid rgba(192,57,43,0.2); margin-bottom:12px;
  }
  .day-tabs { display:flex; gap:4px; margin-bottom:12px; }
  .day-tab {
    flex:1; padding:5px 0; border:1px solid var(--border); background:var(--bg);
    color:var(--text-sub); font-family:'Noto Sans KR',sans-serif;
    font-size:12px; font-weight:500; border-radius:5px; cursor:pointer; transition:all 0.15s;
  }
  .day-tab:hover { background:var(--primary-soft); color:var(--primary); border-color:rgba(192,57,43,0.3); }
  .day-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); font-weight:700; }
  .chart-wrap { position:relative; height:175px; }
  .congestion-summary { margin-top:10px; display:flex; gap:8px; }
  .summary-box {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:6px; padding:6px 8px; text-align:center;
  }
  .summary-label { font-size:10px; color:var(--text-sub); margin-bottom:2px; }
  .summary-val   { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; }
</style>
</head>
<body>

<header>
  <div class="header-icon">📮</div>
  <div>
    <h1>도봉구 우체국·우편취급소 혼잡도</h1>
    <p>카카오 시간대별 방문자 데이터 기반 · 평일(월~금) · 09:00–17:00</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4caf7d"></div>여유 (~40%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div>보통 (40~65%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e05a2b"></div>혼잡 (65~85%)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>매우혼잡 (85%+)</div>
  </div>
</header>

<div id="map-wrap">
  <div id="map"></div>
  <div id="overlay-msg">
    <div class="msg-icon">⏳</div>
    <div class="msg-title">지도를 불러오는 중...</div>
    <div class="msg-body">잠시만 기다려 주세요.</div>
  </div>
  <div class="hint">📌 마커를 클릭하면 시간대별 혼잡도 차트가 표시됩니다</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  ⚠️  카카오 JavaScript 앱 키를 여기에 입력하세요
// ═══════════════════════════════════════════════
const KAKAO_APP_KEY = '39f3be41b026459dbd16cc4d7cb875a9';

// ── 혼잡도 데이터 ──
const DATA = {

           "화":{"9":59.1,"10":23.4,"11":35.4,"12":56.6,"13":51.4,"14":88.0,"15":89.7,"16":54.0,"17":36.3},
           "수":{"9":45.4,"10":57.4,"11":46.0,"12":19.7,"13":37.4,"14":73.7,"15":63.7,"16":100.0,"17":35.4},
           "목":{"9":45.7,"10":70.0,"11":34.0,"12":32.3,"13":61.7,"14":62.9,"15":52.3,"16":52.9,"17":59.7},
           "금":{"9":47.4,"10":59.7,"11":71.7,"12":57.4,"13":63.7,"14":89.4,"15":68.0,"16":68.6,"17":40.3}}},

    days:{ "월":{"9":25.9,"10":77.8,"11":44.1,"12":null,"13":46.3,"14":29.8,"15":22.0,"16":30.2,"17":26.1},
           "화":{"9":32.7,"10":42.0,"11":25.9,"12":null,"13":28.2,"14":28.8,"15":21.4,"16":38.6,"17":42.7},
           "수":{"9":14.9,"10":100.0,"11":32.9,"12":null,"13":43.7,"14":35.5,"15":19.6,"16":28.4,"17":16.9},
           "목":{"9":15.1,"10":57.8,"11":33.1,"12":null,"13":43.7,"14":35.7,"15":45.3,"16":45.7,"17":34.1},
           "금":{"9":24.5,"10":59.0,"11":42.9,"12":null,"13":28.2,"14":38.0,"15":22.7,"16":48.4,"17":28.6}}},
  "8102798": { name:"서울창5동우체국",      category:"우체국",     lat:37.6354, lng:127.0472,
    days:{ "월":{"9":38.7,"10":42.8,"11":38.2,"12":null,"13":36.3,"14":50.0,"15":50.9,"16":57.5,"17":49.6},
           "화":{"9":46.3,"10":41.0,"11":37.1,"12":null,"13":44.7,"14":40.4,"15":40.9,"16":61.5,"17":40.3},
           "수":{"9":34.9,"10":34.9,"11":40.3,"12":null,"13":47.8,"14":42.2,"15":48.4,"16":54.3,"17":43.5},
           "목":{"9":36.3,"10":54.7,"11":40.1,"12":null,"13":34.0,"14":39.1,"15":40.6,"16":45.7,"17":44.1},
           "금":{"9":32.2,"10":41.3,"11":32.1,"12":null,"13":59.4,"14":41.0,"15":43.5,"16":58.4,"17":100.0}}},
  "9424850": { name:"서울쌍문한양우편취급국",category:"우편취급국", lat:37.6450, lng:127.0380,
    days:{ "월":{"9":60.9,"10":31.5,"11":85.9,"12":28.8,"13":58.2,"14":34.8,"15":57.1,"16":59.8,"17":76.1},
           "화":{"9":58.7,"10":32.1,"11":39.1,"12":53.3,"13":58.2,"14":57.1,"15":56.0,"16":58.2,"17":26.1},
           "수":{"9":58.2,"10":29.9,"11":37.5,"12":51.6,"13":31.5,"14":31.0,"15":53.8,"16":32.1,"17":51.1},
           "목":{"9":54.9,"10":52.7,"11":80.4,"12":49.5,"13":53.8,"14":28.8,"15":76.6,"16":54.3,"17":73.9},
           "금":{"9":54.9,"10":29.9,"11":29.9,"12":100.0,"13":56.0,"14":31.0,"15":33.2,"16":34.8,"17":28.8}}}
};

const HOURS = ["9","10","11","12","13","14","15","16","17"];
const DAYS  = ["월","화","수","목","금"];

function color(v) {
  if (v==null) return '#aaa';
  if (v<40)   return '#4caf7d';
  if (v<65)   return '#f0b429';
  if (v<85)   return '#e05a2b';
  return '#c0392b';
}
function avg(place) {
  let s=0,c=0;
  for(const d of DAYS) for(const h of HOURS){const v=place.days[d]?.[h];if(v!=null){s+=v;c++;}}
  return c?s/c:0;
}
function svgUrl(col) {
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(
    `<svg width="36" height="46" viewBox="0 0 36 46" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 28 18 28S36 31.5 36 18C36 8.06 27.94 0 18 0z"
        fill="${col}" stroke="white" stroke-width="2.5"/>
      <text x="18" y="23" text-anchor="middle" font-size="15" fill="white">📮</text>
    </svg>`);
}

// 전역 상태 (팝업 onclick에서 접근)
let openOverlay = null;
let openChart   = null;

function closeOverlay() {
  if (openOverlay) { openOverlay.setMap(null); openOverlay = null; }
  if (openChart)   { openChart.destroy();      openChart   = null; }
}

function renderChart(canvasId, place, day) {
  if (openChart) { openChart.destroy(); openChart = null; }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const vals = HOURS.map(h => place.days[day]?.[h] ?? null);
  openChart = new Chart(canvas.getContext('2d'), {
    type:'bar',
    data:{ labels:HOURS.map(h=>h+'시'), datasets:[{ data:vals, backgroundColor:vals.map(v=>color(v)), borderWidth:0, borderRadius:4, borderSkipped:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{label:c=>c.raw!=null?`혼잡도 ${c.raw}%`:'데이터 없음'},
        backgroundColor:'#fff', borderColor:'#e2e6ec', borderWidth:1, titleColor:'#1a1e2e', bodyColor:'#5a6478' } },
      scales:{
        x:{ticks:{color:'#5a6478',font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},
        y:{min:0,max:100,ticks:{color:'#5a6478',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.06)'}}
      }
    }
  });
}

function updatePopup(pid, day) {
  const place   = DATA[pid];
  const raw     = HOURS.map(h => place.days[day]?.[h] ?? null);
  const vals    = raw.filter(v=>v!=null);
  const a       = vals.length?(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1):null;
  const p       = vals.length?Math.max(...vals).toFixed(1):null;
  const pi      = vals.length?raw.map((v,i)=>({v,i})).filter(x=>x.v!=null).sort((a,b)=>b.v-a.v)[0].i:null;
  const g = id => document.getElementById(id);
  if(g(`avg-${pid}`))   g(`avg-${pid}`).textContent   = a !=null?a+'%':'-';
  if(g(`peak-${pid}`))  g(`peak-${pid}`).textContent  = p !=null?p+'%':'-';
  if(g(`peakh-${pid}`)) g(`peakh-${pid}`).textContent = pi!=null?HOURS[pi]+'시':'-';
  renderChart(`chart-${pid}`, place, day);
  document.querySelectorAll(`.day-tab[data-pid="${pid}"]`).forEach(b=>b.classList.toggle('active',b.dataset.day===day));
}

// ── 에러 표시 ──
function showError(title, body) {
  document.getElementById('overlay-msg').innerHTML =
    `<div class="msg-icon">⚠️</div>
     <div class="msg-title">${title}</div>
     <div class="msg-body">${body}</div>`;
}

// ── 카카오 SDK 동적 로드 ──
function initMap() {
  if (!KAKAO_APP_KEY || KAKAO_APP_KEY === 'YOUR_APP_KEY') {
    showError('앱 키 미설정',
      'HTML 파일 상단 <b>KAKAO_APP_KEY</b>에 카카오 JavaScript 앱 키를 입력해 주세요.<br>' +
      '<div class="msg-code">const KAKAO_APP_KEY = \'발급받은_앱키\';</div>');
    return;
  }

  const s = document.createElement('script');
  s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false`;
  s.referrerPolicy = 'no-referrer-when-downgrade';

  s.onload = function() {
    kakao.maps.load(function() {
      // 로딩 오버레이 제거
      document.getElementById('overlay-msg').style.display = 'none';

      const mapEl = document.getElementById('map');
      const map   = new kakao.maps.Map(mapEl, {
        center: new kakao.maps.LatLng(37.655, 127.028),
        level:  5
      });
      map.addControl(new kakao.maps.ZoomControl(),    kakao.maps.ControlPosition.RIGHT);
      map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

      for (const [pid, place] of Object.entries(DATA)) {
        const pos = new kakao.maps.LatLng(place.lat, place.lng);
        const mrk = new kakao.maps.Marker({
          position: pos, map: map,
          image: new kakao.maps.MarkerImage(svgUrl(color(avg(place))),
            new kakao.maps.Size(36,46), {offset:new kakao.maps.Point(18,46)})
        });

        const html = `
          <div class="k-popup-wrap">
            <button class="k-popup-close" onclick="closeOverlay()">✕</button>
            <div class="k-popup-inner">
              <div class="k-popup-name">${place.name}</div>
              <div class="k-popup-badge">${place.category}</div>
              <div class="day-tabs">
                ${DAYS.map(d=>`<button class="day-tab${d==='월'?' active':''}" data-pid="${pid}" data-day="${d}" onclick="updatePopup('${pid}','${d}')">${d}</button>`).join('')}
              </div>
              <div class="chart-wrap"><canvas id="chart-${pid}"></canvas></div>
              <div class="congestion-summary">
                <div class="summary-box"><div class="summary-label">평균 혼잡도</div><div class="summary-val" id="avg-${pid}">-</div></div>
                <div class="summary-box"><div class="summary-label">피크 혼잡도</div><div class="summary-val" id="peak-${pid}">-</div></div>
                <div class="summary-box"><div class="summary-label">피크 시간</div><div class="summary-val" id="peakh-${pid}">-</div></div>
              </div>
            </div>
          </div>`;

        const ov = new kakao.maps.CustomOverlay({ position:pos, content:html, yAnchor:1.08, zIndex:3 });

        kakao.maps.event.addListener(mrk, 'click', function() {
          if (openOverlay === ov) { closeOverlay(); return; }
          closeOverlay();
          ov.setMap(map);
          openOverlay = ov;
          setTimeout(function(){ updatePopup(pid, '월'); }, 60);
        });
      }

      kakao.maps.event.addListener(map, 'click', closeOverlay);
    });
  };

  s.onerror = function() {
    showError('지도 로드 실패',
      '앱 키가 올바르지 않거나 도메인이 등록되지 않았습니다.<br>' +
      '<a href="https://developers.kakao.com" target="_blank" style="color:var(--primary)">카카오 개발자센터</a>에서 Web 플랫폼에 도메인을 등록해 주세요.<br>' +
      '<div class="msg-code">로컬 테스트: http://localhost 등록 후<br>python -m http.server 로 실행</div>');
  };

  document.head.appendChild(s);
}

window.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
</html>
